      - paragraph [ref=e64]: The flickering light of your torch casts wavering shadows across the crumbled altar and scorched wooden beams of the ruined chapel. You crouch beside the largest stone slab, fingertips tracing the faintly etched runes as the mage murmurs their ancient names, eyes narrowing in concentration. Their voice carries the weight of old magic, but the runes resist full clarity, whispering fragments of their meaning—a protective ward, perhaps, but veiled in mystery and age. Around you, the healer moves methodically, her gaze sweeping the walls and rubble, searching for signs hidden beneath layers of dirt and ash. Yet despite her diligence, the secrets you seek remain stubbornly out of reach; the runes do not glow with the Moon-Ash’s faint light here, and any insight slips through her grasp like smoke. Lyra frowns, lifting a small horn vial glowing dimly with pale dust. "These markings hint at a ward, but it's incomplete. We need more—maybe the relic’s closer than we think, or deeper still in this place." Her fingers brush the runes again, but with less certainty now. The chapel holds its silence, the air thick with the scent of burnt wood and the weight of unseen eyes. Somewhere beyond these walls, the Starwell Relic waits, its secrets pressed just out of reach. Your hands still tingle with the rune’s latent power, and the path forward feels crooked—part promise, part warning. What will you do next?
