      - paragraph [ref=e116]: "Bran moves with assured steps, his shield steady before him, muscles coiled for any sudden threat as you push deeper into the husk of the ruined chapel. Shadows cling like cobwebs to the crumbled pews and shattered altar, but Bran’s vigilance keeps the lurking darkness at bay. His sharp eyes catch shifts in the gloom—fallen stones, twisted metal, but nothing that dares to step into the open just yet. Kneeling beside a weathered pillar, you trace the ancient runes carved deep into its crumbling surface. Your fingers brush away centuries of dust as a pale glow begins to shimmer faintly in the grooves—the moon-ash reacting to the arcane residue long left behind. The runes pulse with fractured magic, speaking in whispers only you can hear. You glean the faint outline of a protective ward, now a fragile echo of power that once shielded the chapel like a guardian’s breath. No active traps remain, but the warning is clear: this place was sanctified against things best left outside. With Bran’s strength holding the line and your insight peeling back the chapel’s secrets, the path ahead opens. The scent of smoke and old stone draws you further in—something calls from the shadows beyond the shattered altar, something tied to the star-lit promise of the relic you seek. What will you do next?"
