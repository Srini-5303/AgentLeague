      - paragraph [ref=e146]: The draugr snarls, its rotted lips peeling back as it swings a heavy, rusted blade at you. You raise your shield just in time, the vicious strike thudding against the iron with a sickening clang. The creature reels back from your counterattack — a solid blow from your axe driving it sideways, staggering but far from finished. Your stance holds firm, a wall against the dark fury surging through this twisted corpse. Sable presses forward, trying to circle low and strike at the draugr’s vulnerable side, but the creature's unnatural senses catch the movement. It snaps its head around just in time, a guttural rasp warning you it will not be caught unawares. Your attempt to flank fails, but you remain ready, dagger sharp and eyes sharp. Mirra’s voice rises in chant beneath the shattered chapel roof, but her words stumble, the ancient galdr faltering against the draugr’s malignant will. The air thickens with an uneasy stillness as the curse woven into the draugr resists the healer’s touch, the creature’s hatred undiminished. The draugr lunges again, its eyes glowing faintly with a cold light, and you feel the weight of dread pressing in. Yet your shield arm does not falter; you hold the line here—stalwart and unyielding. The ruin’s shadows deepen, the fight far from over. What will you do next to break the dread knot tightening around this forsaken place?
