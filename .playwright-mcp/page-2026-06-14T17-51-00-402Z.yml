      - paragraph [ref=e186]: You grit your teeth as the draugr’s rusted axe cleaves through Bran’s side; the warrior staggers but holds firm, raising his shield just in time to deflect the fiend’s next swipe aimed at Lyra. You see Lyra falter, a deep slash across her arm spilling thick blood, but she slips behind Bran’s steadfast defense. Sable moves swiftly, cutting the undead menace from the side, snarling a warning that gives you all a moment’s breath. Bran’s shield is steady as a mountain, his stance unyielding, and with a grim roar, he drives his sword into the draugr’s exposed ribs, carving a deep wound. The creature snarls, weakened but relentless. At your knees, the healer chants the sacred galdr, pressing salves of sacred moon-ash into your wounds. Warmth radiates outward—Bran’s bleeding slows to a thin trickle, and Lyra’s breaths deepen, color returning faintly to her as the poison of claw and blade is drawn from their flesh. The slow bleed halts; strength begins its slow return. The chapel’s ruined stones echo with this violent rhythm of attack and healing. Your shield arm aches from holding, but you know the draugr’s fury will soon turn again. Bran’s eyes meet yours, steady despite pain — “Now, Sable, finish this!” The draugr lurches, wounded but maddened, claws slashing for a killing strike. The moment to act is now. What will you do next?
