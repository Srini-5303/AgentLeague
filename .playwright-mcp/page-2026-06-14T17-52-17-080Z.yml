      - paragraph [ref=e206]: The draugr’s axe sinks deep into Bran’s chest — a cruel, echoing crack that chills your blood. His breath stutters, and his grip falters as the cold seep of death threatens to claim him. At the same moment, Lyra cries out, clutching a savage clawed gash that rends her side. Both fall to their knees, blood pooling dark and hot beneath them. You drop beside Bran first, pressing your hands over the ragged wound. The ancient galdr you weave is old and solemn, a shield against the shadow’s claim. The power flows, but your chant falters, the chill breath of the draugr chilling your very soul. The bleeding slows, but the wound remains grave — the night still eager to swallow him whole. Turning hurriedly to Lyra, you find her pale and trembling, the deep gash cruel and raw. You raise your voice again, calling on the old chants to stem the flow and mend the flesh torn by death’s cruel hand. But the darkness is stubborn tonight, and though you hold the edge, the wound is still harsh and raw. The cold night presses close, heavy with the scent of iron and broken hopes. Around you, the Ruined Chapel groans under the weight of ancient sorrows. The faint glow of the eye-sigil on the altar flickers like a dying star — a fragile beacon amid the encroaching shadows. Time narrows to a brittle edge, desperate and urgent. Bran struggles to breathe, and Lyra’s hand trembles as she clutches her side. The night waits — silent, watchful, and unforgiving. What will you do now?
