      - paragraph [ref=e263]: The ancient mechanism grinds with a slow, relentless rhythm, stone scraping against stone like the rasp of a forgotten beast awakening beneath the world. As the great gate shudders open, the faint scent of damp earth and old magic spills forth, mingling with the stale air of the ruined chapel. The runes that now glow softly along the gate’s edges pulse faintly—a gentle heartbeat of arcane life. Your careful scrutiny reveals no hostile wards or hidden traps; the sigil’s power has done its work well, offering passage without immediate peril. Sable slips through the darkened maw ahead with the silence of a shadow and the keen eyes of a seasoned scout. Her footsteps leave barely a sound against the cold stone floor, and after a tense moment she signals back—a narrow corridor stretches ahead, winding deeper beneath the chapel, lit only by the faint gleam of moon-ash that drifts through cracks in the ruined roof above. No signs of guardians stir in this moment, but the air hums with latent power, a subtle warning that the ancient vault beyond may yet conceal more than mere stones and echoes. The way forward yawns wide, the secrets of the Moonlit Gate beckoning your party into the darkness below. What steps do you take next?
