      - paragraph [ref=e283]: The instant the black venom sinks into your veins, it feels as if shadowy tendrils coil in your blood, twisting and choking. Your breath catches as the Ruined Chapel’s heavy gate crashes shut behind you with a final, echoing slam. Beyond the iron bars, your companions’ startled cries and pounding fists fade, blocked by the thick wooden door now sealed tight. Aria’s voice trembles as she stoically begins the old healing galdr, her hands moving with practiced precision to ready the herbs and poultices from her pack. But despite her steady calm, the dark venom resists every effort, slipping beneath skin and sinew like a living shade. The power of the Silver Root seems to falter, unable to halt the venom’s cruel advance. A cold sweat breaks out across your forehead; the poison’s gnawing chill deepens in your joints, and a growing weakness clouds your vision. Outside, the muffled panic of your friends grows desperate, but they cannot reach you. The venom’s curse is a shadow’s touch — ancient and relentless — and for now, it binds you trapped, alone in the chapel’s cursed stillness. Time presses heavy, the air thick with unspoken dread, as you realize this affliction may demand a brutal choice before the night is through. The faint glow of the altar’s eye-sigil flickers in the gloom — a silent sentinel amid your growing darkness — and beyond the threshold, the world waits for your next move.
