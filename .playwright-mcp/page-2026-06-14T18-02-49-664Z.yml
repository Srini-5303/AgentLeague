      - paragraph [ref=e299]: "The acrid sting of poison fades entirely from your blood as Mirra’s moon-ash pressed lips seal the last trace of venom away. Your veins no longer burn with venom’s betrayal; instead, a quiet clarity settles deep within, easing your breath and sharpening your senses. Mirra’s eyes meet yours — a flicker of relief shining through the lingering shadows of the chapel’s ruin. You follow the mage’s careful lead to the altar’s base, where ancient runes crawl like spectral whispers across cracked stone. Your fingers brush across the carvings—faint yet unmistakably glyphic—illuminated softly by the pale dust of Máni’s ash still clinging to the surface. The runes vibrate faintly with seiðr’s wild pulse, yet their arrangement speaks of warding and concealment, woven in pre-Shatter magic to guard the relic beneath. Their meaning unfolds in your mind: a layered weave of protection, designed to deter the unworthy with curses that sap strength and muddle the senses. But your careful study reveals a subtle flaw, a brittle fracture in the enchantment—likely a consequence of the Shards’ fracture bleeding through the veil. The path to the relic is guarded, but not utterly barred. Beside you, Mirra and the mage exchange a glance, the air thick with unspoken caution and mounting resolve. The Starwell Relic lies just beneath your feet, humming faintly beneath the altar’s stone. The ruins creak softly, as if the ancient hof itself holds its breath. The moment demands your next move. Will you seek to disarm the ward with a delicate ritual, attempt to pry the relic loose quickly, or first scout the surrounding shadows for further threats?"
