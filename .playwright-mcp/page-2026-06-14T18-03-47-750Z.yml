      - paragraph [ref=e313]: You lift the Starwell Relic free from the stone pedestal, its faint, eerie glow casting flickering shadows across the ruined walls of the chapel. The Shard’s cold surface hums faintly in your hand, a pulse slower and deeper than a heartbeat, as if the piece of Máni itself still clings to slumber beneath its fractured light. The mage steps closer to examine the runes carved into the Shard’s surface, fingers tracing its cold edges. Yet the ancient symbols remain stubbornly indecipherable—no hidden meaning reveals itself this time. The patchwork of fragmented power warps your vision; the broken runes resist your arcane insight, and the magic twists like a knot in your thoughts. Beside you, the healer murmurs a solemn galdr while laying a reassuring hand on the empty pedestal. Their voice is low, weaving threads of protection, honoring the relic as a sacred charge, neither prize nor weapon. A delicate balance trembles in the air, tethering you to the fate of Eldervale itself. The chamber’s shadows deepen, and the shard’s glow seems to pulse in resonance with the broken sky outside. Holding it now, you sense the tension between hope and peril, the quiet stirrings of forces both seen and unseen watching, waiting. The Starwell Relic is yours — but what will you do next, with the fragile light of Máni in your grasp?
