      - paragraph [ref=e328]: Your shield plants firmly, but the sharp agony in Bran’s leg screams betrayal — the draugr’s rusted blade tore deeper than you’d hoped. You grit your teeth, bracing on one leg to steady yourself against the pull of pain. The foul creature snarls, relentless and hungry. Beside you, Lyra kneels by Sable, hands steady even as the grave-rot seeps wickedly from the bite. She traces ancient runes with the purified water, the glow faint but flickering like a candle’s breath. The ward stutters — a partial barrier thrown up, enough to slow the creeping death but not halt it. Sable’s breathing is ragged, and you catch the tremble in her shoulder where the rot still glistens. The draugr, undeterred, shifts its gaze from you to the wounded mage, fangs bared anew. You feel the sharp edge of time — the battle is far from over, and every moment counts as the darkness gnaws at your friends. Your leg aches, the pain a cruel anchor, but your axe is ready. What will you do next?
