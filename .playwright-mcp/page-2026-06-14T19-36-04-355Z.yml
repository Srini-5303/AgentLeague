    - generic [ref=e10]:
      - paragraph [ref=e82]: "You lift the glowing Shard of Máni high, its pale light casting shifting shadows over the blackened stones of the ruined chapel. The fractured gleam seems to pulse in rhythm with your heartbeat, a fragile beacon against the encroaching gloom. Your call rings out, steady and commanding, drawing your companions to the narrow threshold where the chapel’s doors sag, half-melted by past fire. Kael moves to the front, shield raised like a bastion against the unknown, his voice a vow of protection so fierce it steels your own resolve. Lyra steps forward, her gaze fixed intently on the shifting patterns within the Shard’s gleam. Her hands move in subtle gestures as she murmurs old runes, the shard’s fractured light unraveling secrets hidden deep in moon-ash and ancient magic. Her eyes glow briefly, and then she speaks with the quiet certainty of one who has glimpsed a thread of truth within the chaos: “The shard’s glow reveals a hidden sigil — a map not just to the Moonlit Gate, but beyond it, tracing a path to a relic the Norns did not intend to reveal. The Starwell Relic lies within reach, but its guarding wards have grown restless with the fracture’s wild magic. We will face more than mere shadows.” You feel the weight of her words like the cold moonlight itself — the fragile calm will not last. Yet here, at the chapel threshold, you and your companions find a moment to steel yourselves, bound by oath and shard alike. The night air stirs with a whisper of winds and distant, mournful howls beyond the broken walls. The path forward is perilous, but your next step is clear: either press into the darkness toward the Starwell Relic or fortify your position and prepare against what might follow through the shattered moon’s cursed embrace."
